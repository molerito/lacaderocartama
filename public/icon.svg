<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradiente principal -->
    <linearGradient id="bgModern" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"></stop>
      <stop offset="100%" stop-color="#020617"></stop>
    </linearGradient>

    <!-- Glow azul -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"></stop>
    </radialGradient>

    <!-- Efecto glass -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#bgModern)"></rect>

  <!-- Glow -->
  <circle cx="50" cy="50" r="40" fill="url(#glow)"></circle>

  <!-- Capa glass -->
  <rect x="5" y="5" width="90" height="45" rx="24" fill="url(#glass)"></rect>

  <!-- Letra M -->
  <text x="50%" y="60%" font-family="Inter, Arial, sans-serif" font-size="42" fill="#e2e8f0" text-anchor="middle" font-weight="700" letter-spacing="1">
    M
  </text>
</svg>